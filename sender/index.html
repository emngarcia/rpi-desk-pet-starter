<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>desk pet ♡</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:       #f0ebe0;
    --bg-alt:   #f5efe3;
    --bg-card:  #fff9f2;
    --bg-pill:  #fff4e8;
    --border:   #ddd0b8;
    --border2:  #c9b090;
    --border3:  #d4aa78;
    --text:     #5a3e28;
    --text2:    #8b6040;
    --text3:    #a08060;
    --text4:    #b09878;
    --accent:   #c9a87c;
    --accent2:  #d4784a;
    --dot:      #ddd5c5;
    --green:    #7ab648;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
    background-size: 22px 22px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    padding: 28px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .header-left { display: flex; align-items: baseline; gap: 14px; }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* same pill style as display's status-pill */
  .status-badge {
    background: var(--bg-pill);
    border: 1.5px solid var(--border3);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text2);
  }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    padding: 28px 24px 88px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .section-label {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* ── STATUS GRID ── */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .status-btn {
    background: var(--bg-alt);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 18px 12px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
    color: var(--text3);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
  }

  .status-btn:hover { border-color: var(--border2); background: var(--bg-card); }

  .status-btn.active {
    border-color: var(--border3);
    background: var(--bg-pill);
    color: var(--text2);
  }

  .status-btn.active::after {
    content: '';
    position: absolute;
    top: 10px; right: 10px;
    width: 7px; height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 1.4s infinite;
  }

  .status-art-img {
    width: 110px;
    height: 88px;
    object-fit: contain;
    image-rendering: pixelated;
    border-radius: 4px;
  }

  /* ── PHOTO BOOTH ── */
  .photo-booth {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }

  .canvas-wrap {
    position: relative;
    background: var(--bg-card);
    border: 2px solid var(--border2);
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 4/3;
  }

  #base-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  #draw-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }

  .canvas-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    pointer-events: none;
  }
  .canvas-placeholder span { font-size: 13px; color: var(--text4); letter-spacing: 3px; text-transform: uppercase; }

  #upload-input { display: none; }

  .upload-label {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-alt);
    border: 1.5px dashed var(--border2);
    border-radius: 6px;
    padding: 11px;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
    width: 100%;
  }
  .upload-label:hover { border-color: var(--border3); color: var(--text2); background: var(--bg-pill); }

  .photo-controls { display: flex; flex-direction: column; gap: 18px; }
  .tool-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  /* pill-shaped tool buttons matching display aesthetic */
  .tool-btn {
    background: var(--bg-alt);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 13px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .tool-btn:hover { border-color: var(--border2); color: var(--text2); }
  .tool-btn.active { border-color: var(--border3); color: var(--text2); background: var(--bg-pill); }

  .color-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.2); }

  .brush-row { display: flex; align-items: center; gap: 10px; }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1; height: 2px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .brush-val { font-size: 13px; color: var(--text4); width: 18px; text-align: right; }

  textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    outline: none;
    height: 90px;
    transition: border-color 0.2s;
    letter-spacing: 0.5px;
  }
  textarea::placeholder { color: var(--text4); }
  textarea:focus { border-color: var(--border2); }

  /* send button — exact same pill as display's status-pill but filled */
  .send-btn {
    width: 100%;
    background: var(--bg-pill);
    border: 1.5px solid var(--border3);
    border-radius: 20px;
    padding: 13px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .send-btn:hover { background: var(--border3); color: var(--bg-card); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* toast — same bouncy spring as display's new-photo-popup */
  .toast {
    position: fixed;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: var(--bg-card);
    border: 1.5px solid var(--border3);
    border-radius: 14px;
    padding: 10px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: bottom 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { bottom: 28px; }
  .toast-dot { width: 7px; height: 7px; background: var(--accent2); border-radius: 50%; }
  .toast-msg { font-size: 14px; color: var(--text2); letter-spacing: 3px; text-transform: uppercase; }

  .countdown-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    width: 100%;
    max-width: 860px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 16px 24px 18px;
  }

  .countdown-label {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    text-align: center;
  }

  .countdown-label span {
    font-weight: 700;
    color: var(--text2);
  }

  .countdown-track {
    height: 14px;
    background: var(--bg-alt);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    width: 0%;
    background: var(--border3);
    border-radius: 4px;
    transition: width 0.6s ease;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>desk pet ♡</h1>
    <span class="subtitle"><span class="live-dot"></span>sender</span>
  </div>
  <div class="status-badge" id="status-badge">loading...</div>
</header>

<main>

  <!-- STATUS -->
  <section>
    <div class="section-label">// status</div>
    <div class="status-grid">

      <button class="status-btn active" data-status="working" onclick="setStatus('working',this)">
        <img class="status-art-img" src="../images/working.png" alt="working">
        working
      </button>

      <button class="status-btn" data-status="gone fishing" onclick="setStatus('gone fishing',this)">
        <img class="status-art-img" src="../images/fishing.png" alt="gone fishing">
        gone fishing
      </button>

      <button class="status-btn" data-status="sleeping" onclick="setStatus('sleeping',this)">
        <img class="status-art-img" src="../images/sleeping.png" alt="sleeping">
        sleeping
      </button>

    </div>
  </section>

  <hr class="divider">

  <!-- PHOTO BOOTH -->
  <section>
    <div class="section-label">// photo + message</div>
    <div class="photo-booth">

      <div>
        <div class="canvas-wrap" id="canvas-wrap">
          <img id="base-img" alt="photo" />
          <canvas id="draw-canvas"></canvas>
          <div class="canvas-placeholder" id="placeholder">
            <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
              <rect x="4" y="8" width="32" height="24" rx="2" stroke="#b09878" stroke-width="1.5"/>
              <circle cx="20" cy="20" r="6" stroke="#b09878" stroke-width="1.5"/>
              <rect x="15" y="6" width="10" height="4" rx="1" stroke="#b09878" stroke-width="1.5"/>
            </svg>
            <span>upload a photo</span>
          </div>
        </div>
        <input type="file" id="upload-input" accept="image/*" onchange="handleUpload(event)">
        <label for="upload-input" class="upload-label">+ upload photo</label>
      </div>

      <div class="photo-controls">

        <div>
          <div class="section-label" style="margin-bottom:10px;">draw</div>
          <div class="tool-row">
            <button class="tool-btn active" id="btn-draw" onclick="setTool('draw')">draw</button>
            <button class="tool-btn" id="btn-erase" onclick="setTool('erase')">erase</button>
            <button class="tool-btn" onclick="clearCanvas()">clear</button>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:10px;">color</div>
          <div class="color-row">
            <div class="color-swatch selected" style="background:#e05a5a" onclick="setColor('#e05a5a',this)"></div>
            <div class="color-swatch" style="background:#e8904a" onclick="setColor('#e8904a',this)"></div>
            <div class="color-swatch" style="background:#f0d840" onclick="setColor('#f0d840',this)"></div>
            <div class="color-swatch" style="background:#7ab648" onclick="setColor('#7ab648',this)"></div>
            <div class="color-swatch" style="background:#5a9ad4" onclick="setColor('#5a9ad4',this)"></div>
            <div class="color-swatch" style="background:#c87adc" onclick="setColor('#c87adc',this)"></div>
            <div class="color-swatch" style="background:#f5f0e8; border:1.5px solid #c9b090" onclick="setColor('#f5f0e8',this)"></div>
            <div class="color-swatch" style="background:#5a3e28" onclick="setColor('#5a3e28',this)"></div>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:10px;">brush size</div>
          <div class="brush-row">
            <input type="range" id="brush-size" min="2" max="30" value="6" step="1">
            <span class="brush-val" id="brush-label">6</span>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
          <div class="section-label">message</div>
          <textarea id="message-input" placeholder="write something sweet..."></textarea>
          <button class="send-btn" id="send-btn" onclick="sendPhoto()">send to display ♡</button>
        </div>

      </div>
    </div>
  </section>

</main>

<div class="countdown-bar">
  <div class="countdown-label" id="countdown-label">— days left</div>
  <div class="countdown-track">
    <div class="countdown-fill" id="countdown-fill"></div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <div class="toast-msg" id="toast-msg">sent ♡</div>
</div>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATUS ──────────────────────────────────────────────────────────────────
async function setStatus(status, btn) {
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('status-badge').textContent = status;
  const { error } = await sb.from('status')
    .update({ value: status, updated_at: new Date().toISOString() })
    .eq('id', 1);
  showToast(error ? 'error :(' : 'status updated ♡');
}

async function loadCurrentStatus() {
  const { data } = await sb.from('status').select('value').eq('id', 1).single();
  if (!data) return;
  document.getElementById('status-badge').textContent = data.value;
  document.querySelectorAll('.status-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.status === data.value)
  );
}
loadCurrentStatus();

// ── COUNTDOWN ───────────────────────────────────────────────────────────────
// Customize start/target dates, or remove this block and the countdown HTML
const COUNTDOWN_START = new Date(2026, 0, 1);

function updateCountdown() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(2026, 11, 31);
  target.setHours(0, 0, 0, 0);

  const msPerDay = 86400000;
  const daysLeft = Math.max(0, Math.ceil((target - today) / msPerDay));
  const totalDays = Math.max(1, Math.ceil((target - COUNTDOWN_START) / msPerDay));
  const elapsed = totalDays - daysLeft;
  const pct = Math.min(100, Math.max(0, (elapsed / totalDays) * 100));

  document.getElementById('countdown-label').innerHTML =
    `<span>${daysLeft}</span> ${daysLeft === 1 ? 'day' : 'days'} left`;
  document.getElementById('countdown-fill').style.width = `${pct}%`;
}
updateCountdown();

// ── CANVAS ──────────────────────────────────────────────────────────────────
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');
let tool = 'draw', color = '#e05a5a', brushSize = 6;
let drawing = false, lastX = 0, lastY = 0, hasPhoto = false;

function getPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx-r.left)*(drawCanvas.width/r.width), y: (cy-r.top)*(drawCanvas.height/r.height) };
}

drawCanvas.addEventListener('mousedown', e => { drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; });
drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; }, {passive:false});
drawCanvas.addEventListener('mouseup',    () => drawing=false);
drawCanvas.addEventListener('touchend',   () => drawing=false);
drawCanvas.addEventListener('mouseleave', () => drawing=false);

function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.globalCompositeOperation = tool==='erase' ? 'destination-out' : 'source-over';
  ctx.strokeStyle = color; ctx.lineWidth = brushSize;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
  lastX=p.x; lastY=p.y;
}
drawCanvas.addEventListener('mousemove', draw);
drawCanvas.addEventListener('touchmove', draw, {passive:false});

function setTool(t) {
  tool=t;
  document.getElementById('btn-draw').classList.toggle('active', t==='draw');
  document.getElementById('btn-erase').classList.toggle('active', t==='erase');
}
function setColor(c, el) {
  color=c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
}
function clearCanvas() { ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height); }

document.getElementById('brush-size').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('brush-label').textContent = brushSize;
});

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('base-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    hasPhoto = true;
    img.onload = () => {
      const r = document.getElementById('canvas-wrap').getBoundingClientRect();
      drawCanvas.width = r.width; drawCanvas.height = r.height;
    };
  };
  reader.readAsDataURL(file);
}

// ── SEND ────────────────────────────────────────────────────────────────────
async function sendPhoto() {
  const message = document.getElementById('message-input').value.trim();
  const btn = document.getElementById('send-btn');
  btn.disabled=true; btn.textContent='sending...';
  try {
    let photoUrl = '';
    if (hasPhoto) {
      const off = document.createElement('canvas');
      off.width=drawCanvas.width; off.height=drawCanvas.height;
      const offCtx=off.getContext('2d');
      offCtx.drawImage(document.getElementById('base-img'),0,0,off.width,off.height);
      offCtx.drawImage(drawCanvas,0,0);
      const blob = await new Promise(res=>off.toBlob(res,'image/jpeg',0.9));
      const fname = `photo_${Date.now()}.jpg`;
      const {error:upErr} = await sb.storage.from('photos').upload(fname,blob,{contentType:'image/jpeg'});
      if (upErr) throw upErr;
      photoUrl = sb.storage.from('photos').getPublicUrl(fname).data.publicUrl;
    }
    const {error} = await sb.from('message').update({
      text: message, photo_url: photoUrl,
      sent_at: new Date().toISOString(), viewed: false
    }).eq('id',1);
    if (error) throw error;
    showToast('sent to display ♡');
    document.getElementById('message-input').value='';
    clearCanvas();
    document.getElementById('base-img').style.display='none';
    document.getElementById('placeholder').style.display='flex';
    hasPhoto=false;
    document.getElementById('upload-input').value='';
  } catch(err) {
    console.error(err);
    showToast('something went wrong :(');
  }
  btn.disabled=false; btn.textContent='send to display ♡';
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
